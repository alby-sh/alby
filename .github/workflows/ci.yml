name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  typecheck:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install setuptools for node-gyp
        run: python3 -m pip install --user setuptools
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
