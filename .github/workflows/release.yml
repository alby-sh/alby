name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # macOS 14 runner ships Python 3.12; node-gyp (via node-pty) still needs
      # distutils — removed from stdlib in 3.12+. Install setuptools to bring
      # it back. PEP 668 makes Homebrew Python externally-managed, so we use
      # a venv (cleaner than --break-system-packages).
      - name: Install setuptools for node-gyp
        run: |
          python3 -m venv "$HOME/build-venv"
          "$HOME/build-venv/bin/pip" install setuptools
          echo "PYTHON=$HOME/build-venv/bin/python3" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm ci

      # Typecheck runs in ci.yml on PRs. We deliberately skip it here so a
      # latent type error never blocks a release of a working build.

      - name: Import Apple Developer ID certificate into a temp keychain
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -e
          CERT_PATH=$RUNNER_TEMP/cert.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=$(uuidgen)

          echo "$APPLE_CERTIFICATE_BASE64" | base64 -d > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Build + sign + notarize + package
        env:
          # electron-builder signing
          CSC_KEYCHAIN: ${{ runner.temp }}/build.keychain
          # electron-builder notarization (via notarytool)
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        # No GH_TOKEN here on purpose. `npm run package` already passes
        # `--publish never` so electron-builder never auto-uploads — we do the
        # GitHub release in a dedicated step below via `gh release create`.
        # Two publish paths (electron-builder auto-publish + manual
        # `gh release create`) used to race: electron-builder would overwrite
        # the zip/dmg bytes after the manual upload, but clients that fetched
        # `latest-mac.yml` between the two uploads would see a checksum the
        # freshly-overwritten zip no longer matched → sha512 mismatch.
        run: npm run package

      - name: Upload artifacts (for non-tag runs)
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: alby-macos
          path: |
            dist/*.dmg
            dist/*.zip
            dist/latest-mac.yml

      # Single publish path: `gh release create` with ALL artifacts at once,
      # including `latest-mac.yml`. Atomic from the auto-updater's point of
      # view — clients never see a `latest-mac.yml` whose referenced zip
      # hasn't been uploaded yet. Fails fast if a release already exists for
      # this tag (e.g. if someone manually `gh release create`d first), so a
      # duplicate-publish race becomes a visible workflow failure instead of
      # a silent checksum mismatch for end users.
      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          gh release create "$TAG" \
            "dist/Alby-${VERSION}-arm64.dmg" \
            "dist/Alby-${VERSION}-arm64.dmg.blockmap" \
            "dist/Alby-${VERSION}-arm64.zip" \
            "dist/Alby-${VERSION}-arm64.zip.blockmap" \
            "dist/Alby-${VERSION}-x64.dmg" \
            "dist/Alby-${VERSION}-x64.dmg.blockmap" \
            "dist/Alby-${VERSION}-x64.zip" \
            "dist/Alby-${VERSION}-x64.zip.blockmap" \
            "dist/latest-mac.yml" \
            --title "$TAG" \
            --generate-notes
